<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Music Control</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
            --dropzone-border: #334155;
            --dropzone-hover: #475569;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        #dropzone {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--dropzone-border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 2rem;
            background: rgba(15, 23, 42, 0.3);
        }

        #dropzone:hover,
        #dropzone.dragover {
            border-color: var(--accent-color);
            background: var(--dropzone-hover);
            transform: scale(1.02);
        }

        #dropzone p {
            margin: 0.5rem 0;
            opacity: 0.7;
        }

        #dropzone .icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        audio {
            width: 100%;
            margin-top: 1rem;
            border-radius: 0.5rem;
            background: #f1f5f9;
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        #file-info {
            margin-top: 1rem;
            font-weight: 600;
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Music Remote</h1>
        <div id="dropzone">
            <div class="icon">🎵</div>
            <p>Drag & Drop Music File Here</p>
            <p style="font-size: 0.75rem;">(MP3, WAV, etc.)</p>
        </div>
        <div id="file-info">No music loaded</div>
        <audio id="audio-player" controls></audio>
        <div class="status">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Disconnected from server</span>
        </div>
    </div>
    <script src="client.js"></script>
</body>

</html>
