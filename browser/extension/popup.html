<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Animated Text</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>Animated Text</h1>
            <p>Audio Syncronizer</p>
        </header>
        <main>
            <div class="card status-card">
                <div id="videoInfo" class="video-info">
                    <span id="videoIdDisplay">No YouTube video detected</span>
                    <span id="currentTimeDisplay">--:--</span>
                </div>
            </div>
            <div class="card control-card">
                <div class="controls">
                    <button id="rewindBtn" class="control-btn" title="Rewind 10s">⏪</button>
                    <button id="playPauseBtn" class="control-btn" title="Play/Pause">⏯️</button>
                    <button id="forwardBtn" class="control-btn" title="Forward 10s">⏩</button>
                </div>
            </div>
            <!-- <div class="card">
                <button id="clickMe" class="btn">Click for Magic</button>
                <div id="message" class="message hidden">
                    <p>✨ Stay Inspired! ✨</p>
                </div>
            </div> -->
        </main>
        <footer>

            <p>
            <div id="wsStatus" class="ws-status">Connecting...</div>
            </p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
